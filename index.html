<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="George Yockachonis portfolio: software development, game tooling, web apps, and IT systems work."
  />
  <title>George Yockachonis | Software Developer</title>
  <link rel="stylesheet" href="styles.css" />
  <noscript>
    <style>
      .noscript-link {
        display: inline-flex;
      }

      #enterBtn {
        display: none;
      }
    </style>
  </noscript>
</head>
<body>
  <section id="splash" aria-label="Portfolio entry animation">
    <div class="split split-top"></div>
    <div class="split split-bottom"></div>
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <div id="brandWrap">
      <div class="brand brand-top">YOCK</div>
      <div class="brand brand-bottom">YOCK</div>
    </div>

    <div class="identity">
      <p class="intro">Portfolio of</p>
      <p class="name">George Yockachonis</p>
      <p class="role">Game Developer | Software Engineer | IT Systems</p>
      <a class="noscript-link" href="portfolio.html">Open Portfolio</a>
      <button id="enterBtn" type="button">
        Enter Portfolio
      </button>
    </div>
  </section>

  <iframe
    id="portfolio"
    class="hidden preview-frame"
    src="portfolio.html"
    title="Portfolio preview"
    aria-hidden="true"
  ></iframe>

  <script src="script.js"></script>
</body>
</html>
